name: Update publications from Google Scholar

on:
  schedule:
    # Saturday night US Eastern (~Sunday 04:00 UTC)
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true

      - name: Fetch publications and citation counts
        env:
          SCHOLAR_ID: LyaJ880AAAAJ
        run: Rscript scripts/update_publications.R

      - name: Commit updated publications data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update publications from Google Scholar"
            git push
          fi
